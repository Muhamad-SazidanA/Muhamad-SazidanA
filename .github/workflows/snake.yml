name: Generate Snake
on:
  schedule:
    # Berjalan setiap 12 jam agar tetap update
    - cron: "0 */12 * * *"
  # Memungkinkan untuk dijalankan secara manual dari tab Actions
  workflow_dispatch:
  # Berjalan setiap ada push ke branch main
  push:
    branches:
    - main

# Memberikan izin bagi bot untuk menulis/menyimpan gambar ke repository
permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # Langkah 1: Mengambil kode dari repository
      - uses: actions/checkout@v3
      
      # Langkah 2: Menghasilkan gambar Snake Game dengan palet warna kustom
      - uses: Platane/snk/svg-only@v3
        with:
          github_user_name: Muhamad-SazidanA
          # Di bawah ini adalah konfigurasi warna kustom Anda
          outputs: |
            # Versi Terang
            dist/github-contribution-grid-snake.svg?color_snake=grey&color_dots=#f0edff,#d7ccff,#bb9eff,#a375ff,#8125ed
            # Versi Gelap (disesuaikan dengan tema Tokyonight)
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark&color_snake=grey&color_dots=#2d2a45,#4b447a,#7c71c7,#a375ff,#bb9eff
            
      # Langkah 3: Menyimpan gambar yang dihasilkan ke branch 'output'
      - uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
